app = "genspark-nanobanana-bridge"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  GENSPARK_HEADLESS = "true"
  GENSPARK_USER_DATA_DIR = "/data/playwright-user-data"
  BROWSER_IDLE_MS = "180000"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/healthz"

[[mounts]]
  source = "genspark_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
