<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>히스토리 — 나노바나나 무료 스튜디오</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body { width: 560px; min-height: 360px; max-height: 680px; }
    .history-main { padding: 12px 16px 20px; }
    .history-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }
    .history-meta {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 8px;
    }
    .history-prompt {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.5;
      max-height: 4.5em;
      overflow: hidden;
    }
    .history-thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
    }
    .history-thumbs img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .history-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .empty-history {
      text-align: center;
      color: var(--text-sub);
      padding: 48px 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="logo">🍌</span>
      <div>
        <h1>생성 히스토리</h1>
        <span class="header-sub">최근 200건까지 보관</span>
      </div>
    </div>
  </header>

  <main class="history-main">
    <div class="history-toolbar">
      <span id="history-count" class="desc" style="margin:0">불러오는 중...</span>
      <button type="button" id="btn-clear-all" class="btn-sm" style="color:var(--danger);border-color:var(--danger)">전체 삭제</button>
    </div>
    <div id="history-list"></div>
  </main>

  <script src="history.js"></script>
</body>
</html>
